<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Orders</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #e3f2fd 0%, #b2ebf2 100%);
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
    }
    .dashboard-container {
      max-width: 1200px;
      margin: 40px auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(33,150,243,0.10);
      padding: 2rem;
    }
    .dashboard-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: #00bcd4;
      margin-bottom: 1.5rem;
      text-align: center;
      letter-spacing: 1px;
    }
    .order-table th, .order-table td {
      vertical-align: middle !important;
      font-size: 1rem;
    }
    .order-table th {
      background: #e3f2fd;
      color: #1976d2;
    }
    .order-table tr {
      transition: background 0.2s;
    }
    .order-table tr:hover {
      background: #f1faff;
    }
    .badge-status {
      font-size: 0.95rem;
      padding: 0.4em 0.8em;
      border-radius: 0.5em;
    }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-paid { background: #d4edda; color: #155724; }
    .badge-shipped { background: #cce5ff; color: #004085; }
    .badge-delivered { background: #d1ecf1; color: #0c5460; }
    .badge-cancelled { background: #f8d7da; color: #721c24; }
    .logout-btn {
      position: absolute;
      top: 24px;
      right: 32px;
      background: #00bcd4;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.5em 1.2em;
      font-weight: 600;
      transition: background 0.2s;
    }
    .logout-btn:hover { background: #0097a7; }
    .status-select {
      min-width: 120px;
      border-radius: 6px;
      border: 1px solid #b2ebf2;
      padding: 0.2em 0.5em;
    }
    .order-details {
      font-size: 0.98rem;
      color: #333;
      margin-bottom: 0.5em;
    }
    .order-details strong { color: #00bcd4; }
    .cart-items-list {
      margin: 0;
      padding-left: 1.2em;
      font-size: 0.97rem;
    }
    .cart-items-list li {
      margin-bottom: 0.2em;
    }
    .delete-btn {
      color: #dc3545;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.2s;
    }
    .delete-btn:hover { color: #a71d2a; }
    .login-container {
      max-width: 400px;
      margin: 80px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(33,150,243,0.10);
      padding: 2rem;
      text-align: center;
    }
    .login-title {
      font-size: 1.5rem;
      color: #00bcd4;
      margin-bottom: 1.2rem;
      font-weight: 700;
    }
    .form-control:focus {
      border-color: #00bcd4;
      box-shadow: 0 0 0 0.2rem rgba(0,188,212,0.15);
    }
  </style>
</head>
<body>
  <button class="logout-btn d-none" id="logoutBtn">Logout</button>
  <div id="loginSection" class="login-container">
    <div class="login-title">Admin Login</div>
    <form id="loginForm">
      <div class="mb-3">
        <input type="email" class="form-control" id="adminEmail" placeholder="Admin Email" required>
      </div>
      <div class="mb-3">
        <input type="password" class="form-control" id="adminPassword" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-theme w-100" style="background:#00bcd4;color:#fff;">Login</button>
    </form>
    <div id="loginError" class="text-danger mt-2" style="display:none;"></div>
  </div>
  <div id="dashboardSection" class="dashboard-container d-none">
    <div class="dashboard-title">Order Management Dashboard</div>
    <div class="table-responsive">
      <table class="table order-table align-middle">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Order Date</th>
            <th>Payment</th>
            <th>Status</th>
            <th>Cart Items</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ordersTableBody">
          <!-- Orders will be rendered here -->
        </tbody>
      </table>
    </div>
  </div>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const firebaseConfig = {
    apiKey: "AIzaSyD2kZj5yEl4GB33sa5rQttmcFiCDgTWF9U",
    authDomain: "globalllc-f9daa.firebaseapp.com",
    projectId: "globalllc-f9daa",
    storageBucket: "globalllc-f9daa.firebasestorage.app",
    messagingSenderId: "901837131301",
    appId: "1:901837131301:web:70a55f90e2f333169279cc"
  };``
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // Set your admin email here:
    const ADMIN_EMAIL = "aaecommercestore2025@gmail.com";

    // Login logic
    const loginSection = document.getElementById('loginSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');

    function showDashboard() {
      loginSection.classList.add('d-none');
      dashboardSection.classList.remove('d-none');
      logoutBtn.classList.remove('d-none');
      fetchAndRenderOrders();
    }
    function showLogin() {
      loginSection.classList.remove('d-none');
      dashboardSection.classList.add('d-none');
      logoutBtn.classList.add('d-none');
    }

    auth.onAuthStateChanged(user => {
      if (user && user.email === ADMIN_EMAIL) {
        showDashboard();
      } else {
        showLogin();
      }
    });

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      loginError.style.display = 'none';
      auth.signInWithEmailAndPassword(email, password)
        .then(userCredential => {
          if (userCredential.user.email !== ADMIN_EMAIL) {
            auth.signOut();
            loginError.textContent = "Access denied: Not an admin.";
            loginError.style.display = '';
          }
        })
        .catch(err => {
          loginError.textContent = err.message;
          loginError.style.display = '';
        });
    });

    logoutBtn.addEventListener('click', function() {
      auth.signOut();
    });

    // Fetch and render orders
    async function fetchAndRenderOrders() {
      const tbody = document.getElementById('ordersTableBody');
      tbody.innerHTML = '<tr><td colspan="7" class="text-center text-secondary">Loading orders...</td></tr>';
      try {
        const snapshot = await db.collection('orders').orderBy('orderDate', 'desc').get();
        if (snapshot.empty) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center text-secondary">No orders found.</td></tr>';
          return;
        }
        tbody.innerHTML = '';
        snapshot.forEach(doc => {
          const order = doc.data();
          const orderId = order.orderId || doc.id;
          const customer = order.customer || {};
          const cart = order.cart || [];
          const orderDate = order.orderDate ? new Date(order.orderDate).toLocaleString() : '';
          const status = order.status || 'pending';
          const paymentType = order.paymentType || '';
          const statusBadge = {
            pending: 'badge-pending',
            pending_payment: 'badge-pending',
            paid: 'badge-paid',
            shipped: 'badge-shipped',
            delivered: 'badge-delivered',
            cancelled: 'badge-cancelled'
          }[status] || 'badge-pending';

          const cartItemsHtml = cart.length
            ? `<ul class="cart-items-list">${cart.map(item =>
                `<li>${item.title || item.name} <span class="text-muted">($${parseFloat(item.price || 0).toFixed(2)})</span></li>`
              ).join('')}</ul>`
            : '<span class="text-muted">No items</span>';

          tbody.innerHTML += `
            <tr>
              <td><strong>${orderId}</strong></td>
              <td>
                <div class="order-details">
                  <strong>${customer.name || ''}</strong><br>
                  <span>${customer.email || ''}</span><br>
                  <span>${customer.phone || ''}</span><br>
                  <span>${customer.address || ''}</span>
                </div>
              </td>
              <td>${orderDate}</td>
              <td>${paymentType}</td>
              <td>
                <span class="badge badge-status ${statusBadge}">${status.replace('_', ' ')}</span>
                <br>
                <select class="status-select mt-2" onchange="updateOrderStatus('${doc.id}', this.value)">
                  <option value="pending" ${status === 'pending' ? 'selected' : ''}>Pending</option>
                  <option value="pending_payment" ${status === 'pending_payment' ? 'selected' : ''}>Pending Payment</option>
                  <option value="paid" ${status === 'paid' ? 'selected' : ''}>Paid</option>
                  <option value="shipped" ${status === 'shipped' ? 'selected' : ''}>Shipped</option>
                  <option value="delivered" ${status === 'delivered' ? 'selected' : ''}>Delivered</option>
                  <option value="cancelled" ${status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                </select>
              </td>
              <td>${cartItemsHtml}</td>
              <td>
                <button class="delete-btn" title="Delete Order" onclick="deleteOrder('${doc.id}')">
                  <i class="fa fa-trash"></i>
                </button>
              </td>
            </tr>
          `;
        });
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-danger text-center">Error loading orders: ${err.message}</td></tr>`;
      }
    }

    // Update order status
    window.updateOrderStatus = async function(docId, newStatus) {
      try {
        await db.collection('orders').doc(docId).update({ status: newStatus });
        fetchAndRenderOrders();
      } catch (err) {
        alert('Failed to update status: ' + err.message);
      }
    };

    // Delete order
    window.deleteOrder = async function(docId) {
      if (!confirm('Are you sure you want to delete this order?')) return;
      try {
        await db.collection('orders').doc(docId).delete();
        fetchAndRenderOrders();
      } catch (err) {
        alert('Failed to delete order: ' + err.message);
      }
    };
  </script>
</body>
</html>
